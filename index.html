<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cours & Contrôles</title>
<style>
  body { font-family: -apple-system, sans-serif; max-width: 700px; margin: 40px auto; padding: 0 20px; background: #f8fafc; color: #1e293b; }
  h1 { font-size: 24px; margin-bottom: 4px; }
  p { color: #64748b; margin-bottom: 32px; }
  .section { background: white; border-radius: 12px; padding: 20px; margin-bottom: 16px; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
  .section h2 { font-size: 16px; margin-bottom: 12px; color: #6366f1; }
  .section ul { list-style: none; padding: 0; margin: 0; }
  .section li { padding: 8px 0; border-bottom: 1px solid #f1f5f9; }
  .section li:last-child { border-bottom: none; }
  .section a { color: #1e293b; text-decoration: none; font-size: 15px; }
  .section a:hover { color: #6366f1; }
  .empty { color: #94a3b8; font-size: 14px; font-style: italic; }
</style>
</head>
<body>
<h1>📚 Cours & Contrôles</h1>
<p>Mayssa · Assiya · Amine</p>
<div class="section"><h2>Mayssa</h2><ul><li class="empty">Aucun fichier pour l'instant</li></ul></div>
<div class="section"><h2>Assiya</h2><ul><li class="empty">Aucun fichier pour l'instant</li></ul></div>
<div class="section"><h2>Amine</h2><ul><li class="empty">Aucun fichier pour l'instant</li></ul></div>
</body>
</html>
