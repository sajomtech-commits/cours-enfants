      },

      {

        opts: [
          "Il faut être riche pour réussir",
          "La persévérance et le courage permettent de réaliser ses rêves",
          "Le théâtre est réservé aux nobles",
          "Il faut obéir à ses parents en toutes circonstances"
        ],
        a: 1,
        fb: { w: "Le roman célèbre la persévérance : malgré sa condition modeste, Louison réalise son rêve grâce à son courage.", c: "Bravo ! C'est un beau message d'espoir et de détermination." }

];

let answers = {};
let chapScores = {};
let currentChap = 0;
let showResults = false;

function totalQs() { return DATA.reduce((s,c)=>s+c.qs.length,0); }
function answered() { return Object.keys(answers).length; }
function totalCorrect() { return Object.values(answers).filter(v=>v).length; }
function totalWrong() { return Object.values(answers).filter(v=>!v).length; }

function updateScoreBar() {
  const a = answered(), tot = totalQs();
  document.getElementById('sc-correct').textContent = totalCorrect();
  document.getElementById('sc-wrong').textContent = totalWrong();
  document.getElementById('sc-pct').textContent = a > 0 ? Math.round(totalCorrect()/tot*100)+'%' : '–';
  document.getElementById('prog').style.width = (a/tot*100)+'%';
  document.getElementById('prog-label').textContent = a + ' / ' + tot + ' questions répondues';
}

function updateChapNav() {
  const nav = document.getElementById('chap-nav');
  nav.innerHTML = DATA.map((ch,i) => {
    const chAnswered = ch.qs.filter((_,qi)=>answers[i+'-'+qi]!==undefined).length;
    const chCorrect = ch.qs.filter((_,qi)=>answers[i+'-'+qi]===true).length;
    let cls = '';
    if (chAnswered === ch.qs.length) cls = chCorrect===ch.qs.length ? 'done' : 'partial';
    if (!showResults && i===currentChap) cls += ' active';
    return `<button class="ch-btn ${cls}" onclick="goChap(${i})">${ch.icon} Ch.${i+1}</button>`;
  }).join('') + (answered()===totalQs() && !showResults ? `<button class="ch-btn active" onclick="showFinalResults()" style="background:var(--gold);border-color:var(--gold);color:var(--ink)">📊 Résultats</button>` : '');
}

function goChap(i) {
  showResults = false;
  currentChap = i;
  renderChap();
}

function renderChap() {
  updateChapNav();
  updateScoreBar();
  const ch = DATA[currentChap];
  const container = document.getElementById('q-container');

  let html = `<div class="chapter-title">${ch.icon} ${ch.title}</div>`;

  ch.qs.forEach((q, qi) => {
    const key = currentChap+'-'+qi;
    const userAns = answers[key];
    const done = userAns !== undefined;

    html += `<div class="q-card" id="qcard-${qi}">
      <div class="q-text"><span class="q-num">${qi+1}</span>${q.q}</div>
      <div class="options">`;

    q.opts.forEach((opt, oi) => {
      let cls = '';
      let indicator = '<div class="opt-indicator"></div>';
      if (done) {
        if (oi === q.a) { cls = 'correct'; indicator = '<div class="opt-indicator">✓</div>'; }
        else if (oi === userAns && oi !== q.a) { cls = 'wrong'; indicator = '<div class="opt-indicator">✗</div>'; }
      }
      html += `<button class="opt-btn ${cls}" ${done?'disabled':''} onclick="answer(${qi},${oi})">${indicator}${opt}</button>`;
    });

    html += `</div>`;

    if (done) {
      const isCorrect = userAns === q.a;
      const fbCls = isCorrect ? 'correct' : 'wrong';
      const fbIcon = isCorrect ? '✅' : '❌';
      const fbText = isCorrect ? q.fb.c : `${q.fb.w}<br><strong>Bonne réponse :</strong> ${q.opts[q.a]}`;
      html += `<div class="feedback-box ${fbCls} show">${fbIcon} ${fbText}</div>`;
    }

    html += `</div>`;
  });

  // Nav buttons
  html += `<div class="nav-btns">`;
  if (currentChap > 0) html += `<button class="nav-btn secondary" onclick="goChap(${currentChap-1})">← Chapitre précédent</button>`;
  if (currentChap < DATA.length-1) html += `<button class="nav-btn primary" onclick="goChap(${currentChap+1})">Chapitre suivant →</button>`;
  if (answered()===totalQs() && currentChap===DATA.length-1) html += `<button class="nav-btn primary" onclick="showFinalResults()">📊 Voir mes résultats</button>`;
  html += `</div>`;

  container.innerHTML = html;
}

function answer(qi, oi) {
  const key = currentChap+'-'+qi;
  if (answers[key] !== undefined) return;
  const q = DATA[currentChap].qs[qi];
  answers[key] = (oi === q.a);
  renderChap();
  setTimeout(()=>{
    const el = document.getElementById('qcard-'+qi);
    if(el) el.scrollIntoView({behavior:'smooth', block:'nearest'});
  }, 100);
}

function showFinalResults() {
  showResults = true;
  updateChapNav();
  const tot = totalQs();
  const correct = totalCorrect();
  const pct = Math.round(correct/tot*100);

  let medal = '⭐';
  let mention = 'Continue tes efforts !';
  if (pct >= 90) { medal = '🏆'; mention = 'Excellent ! Tu es prête pour le contrôle !'; }
  else if (pct >= 75) { medal = '🥇'; mention = 'Très bon travail, encore un peu de révision !'; }
  else if (pct >= 50) { medal = '🥈'; mention = 'Bon début ! Relis les chapitres difficiles.'; }

  let chGrid = DATA.map((ch,i) => {
    const chCorrect = ch.qs.filter((_,qi)=>answers[i+'-'+qi]===true).length;
    const chTot = ch.qs.length;
    const chPct = Math.round(chCorrect/chTot*100);
    const color = chPct===100 ? '#2D6A4F' : chPct>=66 ? '#C8972A' : '#8B1A1A';
    return `<div class="result-ch-card">
      <div class="ch-score" style="color:${color}">${chCorrect}/${chTot}</div>
      <div class="ch-name">${ch.icon} Ch.${i+1}</div>
    </div>`;
  }).join('');

  let tips = '';
  DATA.forEach((ch,i)=>{
    const chCorrect = ch.qs.filter((_,qi)=>answers[i+'-'+qi]===true).length;
    if(chCorrect < ch.qs.length) {
      const wrong = ch.qs.filter((_,qi)=>answers[i+'-'+qi]===false);
      tips += wrong.map(q=>`• <strong>${q.q}</strong><br>→ ${q.opts[q.a]}<br>`).join('');
    }
  });

  document.getElementById('q-container').innerHTML = `
    <div class="result-screen">
      <div class="result-medal">${medal}</div>
      <div class="result-title">Ton résultat</div>
      <div class="result-score-big">${correct} / ${tot}</div>
      <p style="color:var(--wine);font-weight:700;margin:0.3rem 0 1rem;font-size:0.95rem">${pct}% — ${mention}</p>
      <div class="result-grid">${chGrid}</div>
      ${tips ? `<div class="tip-box"><strong>📚 À revoir :</strong><br><br>${tips}</div>` : `<div class="tip-box" style="background:#E8F5E9;border:1px solid #4CAF50"><strong style="color:var(--correct)">🎉 Félicitations !</strong><br>Tu as répondu correctement à toutes les questions. Tu es parfaitement prête pour ton contrôle !</div>`}
      <div class="nav-btns" style="margin-top:1.5rem">
        <button class="nav-btn secondary" onclick="restart()">🔄 Recommencer</button>
        <button class="nav-btn primary" onclick="goChap(0)">📖 Revoir les questions</button>
      </div>
    </div>`;
}

function restart() {
  answers = {};
  currentChap = 0;
  showResults = false;
  renderChap();
  updateScoreBar();
  updateChapNav();
}

renderChap();
updateScoreBar();
updateChapNav();
</script>
